name: "AI Code Review"
on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: "Resolve PR head ref (workflow_dispatch only)"
        id: pr_head
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HEAD_REF=$(gh pr view ${{ inputs.pr_number }} --repo "${{ github.repository }}" --json headRefName -q .headRefName)
          if [ -z "$HEAD_REF" ]; then
            echo "::error::Could not resolve headRefName for PR ${{ inputs.pr_number }} — PR may be closed or missing."
            exit 1
          fi
          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && steps.pr_head.outputs.head_ref || github.event.pull_request.head.ref || github.ref }}

      - name: "Get PR diff"
        id: diff
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Resolve base branch: available on pull_request events; look it up for workflow_dispatch
          if [ -n "${{ github.base_ref }}" ]; then
            BASE_REF="${{ github.base_ref }}"
          else
            BASE_REF=$(gh pr view ${{ inputs.pr_number }} --repo "${{ github.repository }}" --json baseRefName -q .baseRefName)
          fi
          git fetch origin "$BASE_REF"
          git diff "origin/$BASE_REF"...HEAD > /tmp/pr.diff
          # Truncate to ~15 000 chars to stay within Gemini input limits
          head -c 15000 /tmp/pr.diff > /tmp/pr_trimmed.diff
          echo "diff_file=/tmp/pr_trimmed.diff" >> $GITHUB_OUTPUT

      - name: "Run Gemini Review"
        id: gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          DIFF=$(cat /tmp/pr_trimmed.diff | jq -Rs .)
          PROMPT=$(jq -n --argjson diff "$DIFF" '{
            contents: [{
              parts: [{
                text: ("Act as a Senior Software Engineer and QA Manager.\nReview the following code diff for tcplanpro.com with a focus on:\n- Objective analysis and technical accuracy.\n- Identifying bugs, logic errors, or edge cases.\n- Security issues (XSS, injection, exposed secrets).\n- Non-idiomatic Python or performance bottlenecks.\n- Ensuring clear logic without marketing-style comments.\nBe direct and concise. If the code is correct, say so briefly.\nOnly comment on things worth fixing — avoid nitpicks.\n\nDiff:\n" + $diff)
              }]
            }]
          }')

          RESPONSE=$(curl -s \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PROMPT")

          REVIEW=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // "Gemini returned no content."')
          echo "review<<EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: "Post review comment"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REVIEW: ${{ steps.gemini.outputs.review }}
        run: |
          PR_NUM=${{ github.event.pull_request.number || inputs.pr_number }}
          printf '## 🤖 Gemini Code Review\n\n%s' "$REVIEW" > /tmp/review_body.md
          gh pr comment "$PR_NUM" --body-file /tmp/review_body.md

      - name: "Label PR"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM=${{ github.event.pull_request.number || inputs.pr_number }}
          gh pr edit "$PR_NUM" --add-label "ai-reviewed"
