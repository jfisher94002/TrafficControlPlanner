name: Code Review

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  build-check:
    name: Build & Lint
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: my-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: my-app

      - name: Test
        run: npm run test
        working-directory: my-app

      - name: Build
        run: npm run build
        working-directory: my-app

  version-check:
    name: Version bump check
    runs-on: ubuntu-latest
    if: "${{ startsWith(github.event.pull_request.title, 'chore: release') }}"
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify package.json version was bumped
        run: |
          BASE_SHA=${{ github.event.pull_request.base.sha }}
          BASE=$(git show "${BASE_SHA}:my-app/package.json" | jq -r .version)
          HEAD=$(jq -r .version my-app/package.json)
          if [ "$BASE" = "$HEAD" ]; then
            echo "ERROR: package.json version was not bumped (still $HEAD)"
            exit 1
          fi
          echo "Version bump: $BASE → $HEAD"

      - name: Verify CHANGELOG.md entry exists
        run: |
          VERSION=$(jq -r .version my-app/package.json)
          if ! grep -q "\[$VERSION\]" CHANGELOG.md; then
            echo "ERROR: No CHANGELOG.md entry found for v$VERSION"
            exit 1
          fi
          echo "CHANGELOG entry found for v$VERSION"
