name: "AI Code Review"
on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr.diff
          echo "Diff size: $(wc -c < pr.diff) bytes"

      - name: Run Gemini Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          pip install -q google-generativeai
          python3 - <<'PYEOF'
          import os, sys
          import google.generativeai as genai

          diff = open("pr.diff").read()
          if not diff.strip():
              print("Empty diff — nothing to review.")
              sys.exit(0)

          genai.configure(api_key=os.environ["GEMINI_API_KEY"])
          model = genai.GenerativeModel("gemini-1.5-flash")

          prompt = f"""Act as a Senior Software Engineer and QA Manager.
          Review the following git diff for tcplanpro.com. Focus on:
          - Bugs, logic errors, or edge cases
          - Security issues (XSS, injection, exposed secrets)
          - Missing or insufficient tests
          - Non-idiomatic TypeScript/React or performance issues
          Be direct and concise. If the code is correct, say so briefly.
          Only comment on things worth fixing — avoid nitpicks.

          ```diff
          {diff[:30000]}
          ```"""

          response = model.generate_content(prompt)
          review = response.text
          print(review)

          import urllib.request, json
          body = "## Gemini Code Review\n\n" + review
          data = json.dumps({"body": body}).encode()
          req = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['REPO']}/issues/{os.environ['PR_NUMBER']}/comments",
              data=data,
              headers={
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "Accept": "application/vnd.github+json",
                  "Content-Type": "application/json",
              },
              method="POST",
          )
          urllib.request.urlopen(req)
          print("Review posted.")
          PYEOF
