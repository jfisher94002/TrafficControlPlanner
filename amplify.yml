version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd my-app
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: my-app/dist
    files:
      - '**/*'
  cache:
    paths:
      - my-app/node_modules/**/*

# ─── API PROXY ────────────────────────────────────────────────────────────────
# Routes backend API calls from the Amplify frontend to the Lambda API Gateway.
# Staging API Gateway URL: https://b38nnen9xg.execute-api.us-west-1.amazonaws.com
customRules:
  - source: /export-pdf
    target: https://b38nnen9xg.execute-api.us-west-1.amazonaws.com/export-pdf
    status: "200"
  - source: /create-issue
    target: https://b38nnen9xg.execute-api.us-west-1.amazonaws.com/create-issue
    status: "200"
  - source: /health
    target: https://b38nnen9xg.execute-api.us-west-1.amazonaws.com/health
    status: "200"
  # React SPA — all /app/* routes served by app.html
  - source: /app
    target: /app.html
    status: "200"
  - source: /app/<*>
    target: /app.html
    status: "200"
  # Fallback for landing page deep links (routes all other paths to index.html)
  - source: /<*>
    target: /index.html
    status: "404-200"
