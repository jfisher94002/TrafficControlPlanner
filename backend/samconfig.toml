version = 0.1

[default.global.parameters]
stack_name = "tcp-backend-dev"

[default.build.parameters]
# use_container compiles Pillow/ReportLab for Amazon Linux arm64.
# Requires Docker Desktop to be running.
use_container = true

[default.deploy.parameters]
capabilities      = "CAPABILITY_IAM"
region            = "us-west-2"
resolve_s3        = true
confirm_changeset = true
parameter_overrides = [
  "Stage=dev",
  "AllowedOrigins=*",
  "CognitoUserPoolId=us-west-1_6NB2hiHif",
  "PlansBucket=REPLACE_WITH_AMPLIFY_PLANS_BUCKET"
]
# GitHubToken must be supplied at deploy time — do NOT commit it here:
#   sam deploy --parameter-overrides "GitHubToken=github_pat_..."
# PlansBucket: find in S3 console — looks like amplify-tcplanpro-dev-... or similar

[staging.global.parameters]
stack_name = "tcp-backend-staging"

[staging.build.parameters]
use_container = true

[staging.deploy.parameters]
capabilities      = "CAPABILITY_IAM"
region            = "us-west-1"
resolve_s3        = true
confirm_changeset = true
parameter_overrides = [
  "Stage=staging",
  "AllowedOrigins=https://staging.tcplanpro.com,https://staging.d1i0disr0t50m8.amplifyapp.com",
  "CognitoUserPoolId=us-west-1_6NB2hiHif",
  "PlansBucket=REPLACE_WITH_AMPLIFY_PLANS_BUCKET"
]
# GitHubToken must be supplied at deploy time:
#   sam deploy --config-env staging --parameter-overrides "GitHubToken=github_pat_..."
# PlansBucket: find in S3 console — looks like amplify-tcplanpro-staging-... or similar
