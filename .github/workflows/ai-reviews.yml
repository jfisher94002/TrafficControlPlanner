name: "AI Code Review"
on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: "Run Gemini Review"
        uses: google-gemini/gemini-review-action@v1
        with:
          # Note the hyphen in 'api-key' for the official action
          api-key: ${{ secrets.GEMINI_API_KEY }}
          model: "gemini-2.0-flash"
          prompt: |
            Act as a Senior Software Engineer and QA Manager.
            Review the code for tcplanpro.com with a focus on:
            - Objective analysis and technical accuracy.
            - Identifying non-idiomatic Python or performance bottlenecks.
            - Ensuring clear logic without marketing style comments.
            Be direct and concise. If the code is correct, say so briefly.
