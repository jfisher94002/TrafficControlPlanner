AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: TCP Backend — FastAPI on Lambda + HTTP API Gateway

Globals:
  Function:
    Runtime: python3.12
    Architectures: [arm64]
    MemorySize: 512
    Timeout: 30
    Environment:
      Variables:
        ALLOWED_ORIGINS: !Ref AllowedOrigins
        GITHUB_TOKEN: !Ref GitHubToken
        GITHUB_REPO: !Ref GitHubRepo
        ASSETS_BUCKET: !Ref TcpAssetsBucket
        SES_SENDER_EMAIL: !Ref SesSenderEmail
        APP_ENV: !Ref Stage

Conditions:
  HasSesSenderEmail: !Not [!Equals [!Ref SesSenderEmail, ""]]
  HasSignupNotifyEmail: !Not [!Equals [!Ref SignupNotifyEmail, ""]]
  # Both sender and notify email must be set before granting SES permissions to SignupNotifyFunction
  HasSignupNotifyConfig: !And
    - !Condition HasSesSenderEmail
    - !Condition HasSignupNotifyEmail

Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
  AllowedOrigins:
    Type: String
    Default: "*"
    Description: "Comma-separated list of allowed CORS origins"
  GitHubToken:
    Type: String
    NoEcho: true
    Default: ""
    Description: "Fine-grained GitHub PAT with issues:write (for feedback portal)"
  GitHubRepo:
    Type: String
    Default: "jfisher94002/TrafficControlPlanner"
    Description: "GitHub repo for feedback issue creation (owner/repo)"
  SesSenderEmail:
    Type: String
    Default: ""
    Description: "SES-verified From/To address for feedback notifications (e.g. jfisher@fisherconsulting.org)"
  SignupNotifyEmail:
    Type: String
    Default: ""
    Description: "Email address to notify for each confirmed Cognito signup"

Resources:

  TcpApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: main.handler
      Description: TCP FastAPI backend (PDF export, issue creation)
      Events:
        ApiRoot:
          Type: HttpApi
          Properties:
            Path: /
            Method: ANY
        ApiProxy:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref TcpAssetsBucket
        - !If
          - HasSesSenderEmail
          - Statement:
              - Effect: Allow
                Action: ses:SendEmail
                Resource: !Sub "arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/${SesSenderEmail}"
          - !Ref AWS::NoValue

  SignupNotifyFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: cognito_post_confirmation.handler
      Description: Sends email notification when a new user completes Cognito signup (PostConfirmation_ConfirmSignUp only)
      Environment:
        Variables:
          SIGNUP_NOTIFY_EMAIL: !Ref SignupNotifyEmail
      Policies:
        - !If
          - HasSignupNotifyConfig
          - Statement:
              - Effect: Allow
                Action: ses:SendEmail
                Resource: !Sub "arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/${SesSenderEmail}"
          - !Ref AWS::NoValue

  TcpAssetsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "tcp-assets-${Stage}-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true       # prevent ACL-based public access
        IgnorePublicAcls: true      # ignore any pre-existing public ACLs
        BlockPublicPolicy: false    # must be false — bucket policy grants public GET on signs/*
        RestrictPublicBuckets: false # must be false — bucket policy grants public GET on signs/*
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: ["*"]
            AllowedMethods: [GET]
            AllowedHeaders: ["*"]
            MaxAge: 3600

  TcpAssetsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref TcpAssetsBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${TcpAssetsBucket}/signs/*"
            Condition:
              Bool:
                aws:SecureTransport: "true"

Outputs:
  ApiUrl:
    Description: "HTTP API Gateway endpoint URL"
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  AssetsBucketName:
    Description: "S3 bucket for sign SVG assets (used by issue #29)"
    Value: !Ref TcpAssetsBucket
  FunctionArn:
    Description: "Lambda function ARN"
    Value: !GetAtt TcpApiFunction.Arn
  SignupNotifyFunctionArn:
    Description: "Lambda function ARN for Cognito post-confirmation notifications"
    Value: !GetAtt SignupNotifyFunction.Arn
