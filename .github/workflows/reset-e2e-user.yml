name: Reset E2E Test User in Cognito

on:
  workflow_dispatch:

jobs:
  reset-e2e-user:
    name: Reset / recreate E2E Cognito user
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION:    us-west-1
      USER_POOL_ID:          us-west-1_6NB2hiHif
      E2E_EMAIL:             ${{ secrets.E2E_TEST_EMAIL }}
      E2E_PASSWORD:          ${{ secrets.E2E_TEST_PASSWORD }}

    steps:
      - name: Install AWS CLI
        run: |
          pip install awscli --quiet

      - name: Delete existing user (ignore errors if not found)
        run: |
          aws cognito-idp admin-delete-user \
            --user-pool-id "$USER_POOL_ID" \
            --username "$E2E_EMAIL" \
            && echo "Deleted existing user" \
            || echo "User not found or delete failed — continuing"

      - name: Create E2E test user
        run: |
          aws cognito-idp admin-create-user \
            --user-pool-id "$USER_POOL_ID" \
            --username "$E2E_EMAIL" \
            --user-attributes Name=email,Value="$E2E_EMAIL" Name=email_verified,Value=true Name=name,Value="E2E Test User" \
            --message-action SUPPRESS
          echo "User created"

      - name: Set permanent password
        run: |
          aws cognito-idp admin-set-user-password \
            --user-pool-id "$USER_POOL_ID" \
            --username "$E2E_EMAIL" \
            --password "$E2E_PASSWORD" \
            --permanent
          echo "Password set — E2E user is ready"
