version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd my-app
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: my-app/dist
    files:
      - '**/*'
  cache:
    paths:
      - my-app/node_modules/**/*

# ─── REWRITES & REDIRECTS ─────────────────────────────────────────────────────
# API proxy rules (/export-pdf, /create-issue, /health) are configured per-
# environment in the Amplify console (App settings → Rewrites and redirects)
# so each environment points to its own API Gateway URL.
#
# The SPA and fallback rules below must remain here as they are environment-
# agnostic and do not contain hardcoded URLs.
customRules:
  # React SPA — all /app/* routes served by app.html
  - source: /app
    target: /app.html
    status: "200"
  - source: /app/<*>
    target: /app.html
    status: "200"
  # Fallback for landing page deep links (routes all other paths to index.html)
  - source: /<*>
    target: /index.html
    status: "404-200"
